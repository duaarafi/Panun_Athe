<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="icon" type="image/png" href="./assests/images/icon.png" />    <!-- web icon -->
</head>
<body>
    <h1> Welcome</h1>
    <h2>Ready to Dive in?</h2>

    <form action="#" method="post">

        <label for="username">Username:</label>
        <input type="text" id="username" name="USERNAME" placeholder="Enter username"><br><br>
        
        <label for="email">Email:</label>
        <input type="text" id="email" name="EMAIL" placeholder="Enter your Email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="PASSWORD" placeholder="Enter your Password"><br><br>

        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your Password"><br><br>

        <label for="remember-me">Remember me</label>
        <input type="checkbox" id="remember-me" name="remember-me"><br><br>

        <button type="submit">Signup</button>

        <p>Already have an account?</p>
         <a href="./login.html">Login</a>

         

    </form>

</body>
</html>
